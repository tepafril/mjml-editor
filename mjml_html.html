<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>MJML Components Reference</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f8f9fa;min-height:100vh}
.header{background:linear-gradient(135deg,#1a1a2e,#16213e 50%,#0f3460);color:#fff;padding:24px 20px 16px}
.header-inner{max-width:900px;margin:0 auto}
.header-title{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.header-title span.logo{font-size:28px;font-weight:800;letter-spacing:-1px}
.badge{background:#e94560;color:#fff;border-radius:6px;padding:2px 8px;font-size:12px;font-weight:700}
.header p{opacity:.7;font-size:13px;margin-bottom:14px}
#search{width:100%;max-width:500px;padding:8px 14px;border-radius:8px;border:none;font-size:14px;outline:none}
.tabs{background:#fff;border-bottom:1px solid #e5e7eb;overflow-x:auto;white-space:nowrap}
.tabs-inner{max-width:900px;margin:0 auto;display:flex;gap:2px;padding:0 20px}
.tab-btn{padding:10px 14px;border:none;background:none;cursor:pointer;font-size:13px;color:#6b7280;border-bottom:2px solid transparent;white-space:nowrap}
.tab-btn.active{font-weight:700;color:#0f3460;border-bottom:2px solid #0f3460}
.main{max-width:900px;margin:0 auto;padding:20px}
.cat-label{font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#9ca3af;margin:0 0 10px}
.comp-card{background:#fff;border-radius:10px;border:1px solid #e5e7eb;margin-bottom:10px;overflow:hidden}
.comp-header{width:100%;display:flex;align-items:center;gap:10px;padding:12px 16px;background:none;border:none;cursor:pointer;text-align:left}
.comp-name{font-family:monospace;font-weight:700;font-size:15px;color:#0f3460}
.cat-tag{font-size:11px;padding:2px 8px;border-radius:99px;font-weight:600;background:#f0f4ff;color:#4f46e5}
.attr-count{font-size:12px;color:#9ca3af}
.spacer{flex:1}
.copy-btn{padding:4px 12px;font-size:12px;font-weight:600;border-radius:6px;border:1px solid #d1d5db;background:#fff;color:#374151;cursor:pointer;white-space:nowrap;transition:background .15s,color .15s}
.copy-btn:hover{background:#0f3460;color:#fff;border-color:#0f3460}
.copy-btn.copied{background:#16a34a;color:#fff;border-color:#16a34a}
.chevron{font-size:16px;color:#9ca3af}
.comp-desc{padding:0 16px 10px;font-size:13px;color:#6b7280}
.attr-table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:#f9fafb}
th{padding:8px 12px;text-align:left;font-weight:600;color:#374151;border-top:1px solid #e5e7eb;border-bottom:1px solid #e5e7eb;white-space:nowrap;font-size:12px}
tbody tr:nth-child(odd){background:#fff}
tbody tr:nth-child(even){background:#fafafa}
td{padding:7px 12px;border-bottom:1px solid #f3f4f6;vertical-align:top}
td.attr-name{font-family:monospace;color:#0f3460;font-weight:600;white-space:nowrap}
td.attr-accepts{color:#7c3aed;font-family:monospace;font-size:12px;white-space:nowrap}
code.def{background:#f3f4f6;padding:1px 6px;border-radius:4px;font-size:12px}
.empty-attrs{padding:8px 16px 14px;font-size:13px;color:#9ca3af;font-style:italic}
.no-results{text-align:center;padding:40px;color:#9ca3af}
.cat-section{margin-bottom:24px}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-title">
      <span class="logo">MJML</span>
      <span class="badge">Components Reference</span>
    </div>
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px">
      <p style="margin:0;opacity:.7;font-size:13px">All standard components with their attributes, accepted values, and defaults.</p>
      <button id="copyAllBtn" onclick="copyAll(this)" style="padding:6px 16px;font-size:13px;font-weight:700;border-radius:7px;border:1.5px solid rgba(255,255,255,0.4);background:rgba(255,255,255,0.12);color:#fff;cursor:pointer;white-space:nowrap;transition:background .15s">Copy All JSON</button>
    </div>
    <input id="search" placeholder="Search components or attributes…" oninput="render()"/>
  </div>
</div>

<div class="tabs">
  <div class="tabs-inner" id="tabs"></div>
</div>

<div class="main" id="main"></div>

// Build a flat lookup: name -> comp object (for copy)
const compMap = {};
for(const comps of Object.values(data)){
  for(const c of comps) compMap[c.name] = c;
}

const cats = ["All", ...Object.keys(data)];
let activeCategory = "All";
const expanded = {};
const copyTimers = {};

function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function buildTabs(){
  const el = document.getElementById("tabs");
  el.innerHTML = cats.map(c =>
    `<button class="tab-btn${c===activeCategory?' active':''}" onclick="setCategory('${c}')">${c}</button>`
  ).join("");
}

function setCategory(c){ activeCategory=c; render(); }

function copyJSON(name, btnEl){
  const comp = compMap[name];
  if(!comp) return;
  const payload = {
    component: comp.name,
    attributes: comp.attrs.map(a => ({
      attribute: a.attr,
      accepts: a.accepts,
      default: a.def || null,
      description: a.desc
    }))
  };
  const json = JSON.stringify(payload, null, 2);
  navigator.clipboard.writeText(json).then(() => {
    btnEl.textContent = "Copied!";
    btnEl.classList.add("copied");
    clearTimeout(copyTimers[name]);
    copyTimers[name] = setTimeout(() => {
      btnEl.textContent = "Copy JSON";
      btnEl.classList.remove("copied");
    }, 2000);
  }).catch(() => {
    // fallback
    const ta = document.createElement("textarea");
    ta.value = json;
    ta.style.position = "fixed"; ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.select(); document.execCommand("copy");
    document.body.removeChild(ta);
    btnEl.textContent = "Copied!";
    btnEl.classList.add("copied");
    clearTimeout(copyTimers[name]);
    copyTimers[name] = setTimeout(() => {
      btnEl.textContent = "Copy JSON";
      btnEl.classList.remove("copied");
    }, 2000);
  });
}

function copyAll(btnEl){
  // Collect unique attributes across all components, track which components use each
  const attrMap = {}; // key = attr name -> {accepts, default, description, components[]}
  for(const [cat, comps] of Object.entries(data)){
    for(const comp of comps){
      for(const a of comp.attrs){
        if(!attrMap[a.attr]){
          attrMap[a.attr] = {
            attribute: a.attr,
            accepts: a.accepts,
            default: a.def || null,
            description: a.desc,
            components: []
          };
        }
        if(!attrMap[a.attr].components.includes(comp.name)){
          attrMap[a.attr].components.push(comp.name);
        }
      }
    }
  }

  const uniqueAttrs = Object.values(attrMap).sort((a,b)=>a.attribute.localeCompare(b.attribute));

  const payload = {
    summary: {
      total_unique_attributes: uniqueAttrs.length,
      total_components: Object.values(data).reduce((s,c)=>s+c.length,0)
    },
    attributes: uniqueAttrs
  };

  const json = JSON.stringify(payload, null, 2);
  navigator.clipboard.writeText(json).then(()=>flashBtn(btnEl)).catch(()=>{
    const ta=document.createElement("textarea");
    ta.value=json; ta.style.position="fixed"; ta.style.opacity="0";
    document.body.appendChild(ta); ta.select(); document.execCommand("copy");
    document.body.removeChild(ta); flashBtn(btnEl);
  });
}

function flashBtn(btnEl){
  const orig = btnEl.textContent;
  btnEl.textContent="Copied!";
  btnEl.style.background="rgba(22,163,74,0.85)";
  btnEl.style.borderColor="rgba(22,163,74,0.9)";
  setTimeout(()=>{
    btnEl.textContent=orig;
    btnEl.style.background="rgba(255,255,255,0.12)";
    btnEl.style.borderColor="rgba(255,255,255,0.4)";
  },2000);
}

function render(){
  const q = document.getElementById("search").value.toLowerCase();
  buildTabs();
  const main = document.getElementById("main");
  let html = "";
  let any = false;

  for(const [cat, comps] of Object.entries(data)){
    if(activeCategory!=="All" && activeCategory!==cat) continue;
    const matched = comps.filter(c =>
      c.name.includes(q) ||
      c.desc.toLowerCase().includes(q) ||
      c.attrs.some(a => a.attr.includes(q) || a.desc.toLowerCase().includes(q))
    );
    if(!matched.length) continue;
    any = true;
    html += `<div class="cat-section"><h2 class="cat-label">${cat}</h2>`;
    for(const comp of matched){
      const key = comp.name;
      const open = !!expanded[key];
      html += `
      <div class="comp-card">
        <button class="comp-header" onclick="toggle('${key}')">
          <span class="comp-name">&lt;${esc(comp.name)}&gt;</span>
          <span class="cat-tag">${cat}</span>
          ${comp.attrs.length ? `<span class="attr-count">${comp.attrs.length} attributes</span>` : ''}
          <span class="spacer"></span>
          <button class="copy-btn" onclick="event.stopPropagation();copyJSON('${esc(comp.name)}',this)">Copy JSON</button>
          <span class="chevron">${open?"▲":"▼"}</span>
        </button>
        <div class="comp-desc">${esc(comp.desc)}</div>`;
      if(open){
        if(comp.attrs.length){
          html += `<div class="attr-table-wrap"><table>
            <thead><tr><th>Attribute</th><th>Accepts</th><th>Default</th><th>Description</th></tr></thead>
            <tbody>`;
          comp.attrs.forEach(a => {
            html += `<tr>
              <td class="attr-name">${esc(a.attr)}</td>
              <td class="attr-accepts">${esc(a.accepts)}</td>
              <td>${a.def ? `<code class="def">${esc(a.def)}</code>` : `<span style="color:#d1d5db">—</span>`}</td>
              <td style="color:#4b5563">${esc(a.desc)}</td>
            </tr>`;
          });
          html += `</tbody></table></div>`;
        } else {
          html += `<div class="empty-attrs">No attributes — content is its text/HTML child node.</div>`;
        }
      }
      html += `</div>`;
    }
    html += `</div>`;
  }

  if(!any) html = `<div class="no-results">No components found for "${esc(q)}"</div>`;
  main.innerHTML = html;
}

function toggle(key){
  expanded[key] = !expanded[key];
  render();
}

render();
